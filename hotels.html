<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>All Hotels</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"> Hotel Booking </a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="hotels.html"> Hotels </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="wishlist.html"> Wishlist </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Header -->

    <section class="py-5 bg-light">
      <div class="container">
        <h2 class="text-center fw-bold mb-4">Explore Hotels</h2>

        <div class="row">
          <div class="col-md-8">
            <input
              type="text"
              class="form-control"
              id="searchHotel"
              placeholder="Search hotel by name"
            />
          </div>

          <div class="col-md-4">
            <select class="form-select" id="sortPrice">
              <option value="default">Sort By</option>

              <option value="low">Price : Low to High</option>

              <option value="high">Price : High to Low</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Hotel List -->

    <section class="container py-5">
      <div class="row" id="hotelContainer">
        <div class="col-12 text-center">
          <div class="loader"></div>
        </div>
      </div>
    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white py-4">
      <div class="container text-center">
        <h5>Hotel Booking</h5>

        <p>© 2026 All Rights Reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>

    <script src="js/hotels.js"></script>
  </body>
</html>
